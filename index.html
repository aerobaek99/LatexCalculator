function fmt(val, sig = 8) {
  if (typeof val !== 'number' || isNaN(val)) return "Error";
  if (!isFinite(val)) return val > 0 ? "Infinity" : "-Infinity";
  if (val === 0) return "0";
  const abs = Math.abs(val);
  if (abs >= 1e-3 && abs < 1e6) return parseFloat(val.toPrecision(sig)).toString();
  return val.toExponential(sig - 1);
}

const supMap = {'0':'⁰','1':'¹','2':'²','3':'³','4':'⁴','5':'⁵','6':'⁶','7':'⁷','8':'⁸','9':'⁹','-':'⁻'};
function toSuperscript(numStr) {
  return String(numStr).split('').map(c => supMap[c] || c).join('');
}

function formatReadableSci(val) {
  if (typeof val !== 'number' || isNaN(val)) return "Error";
  if (!isFinite(val)) return val > 0 ? "Infinity" : "-Infinity";
  if (val === 0) return "0";
  const abs = Math.abs(val);
  if (abs >= 1e-3 && abs < 1e5) return parseFloat(val.toPrecision(5)).toString();
  const exp = Math.floor(Math.log10(abs));
  const mantissa = val / Math.pow(10, exp);
  return `${mantissa.toFixed(2)} × 10${toSuperscript(exp)}`;
}

function isLatex(s) {
  return /\\[a-zA-Z]/.test(s) || /\\frac/.test(s) || /\^\{/.test(s) || /_\{/.test(s) || /\\begin/.test(s) || /&\s*=/.test(s);
}

function isMultiLineLatex(s) {
  return /\\begin\{/.test(s) || (s.includes('\\\\') && s.includes('&'));
}

function balanceParens(str) {
  let open = 0, close = 0;
  for (let i = 0; i < str.length; i++) {
      if (str[i] === '(') open++;
      else if (str[i] === ')') {
          if (open > 0) open--;
          else close++;
      }
  }
  return '('.repeat(close) + str + ')'.repeat(open);
}

function parseLatexBlock(tex) {
  let s = tex;
  s = s.replace(/\\begin\{[^}]*\}/g, '');
  s = s.replace(/\\end\{[^}]*\}/g, '');
  const rawLines = s.split(/\\\\/);
  const equations = [];
  let currentLhs = '';
  rawLines.forEach((line, idx) => {
    let l = line.trim();
    if (!l) return;
    const parts = l.split('&').map(p => p.trim()).filter(Boolean);
    if (parts.length === 0) return;

    let lhs = '', rhs = '';
    if (parts.length >= 2) {
      lhs = parts[0];
      rhs = parts.slice(1).join(' ').replace(/^\s*=\s*/, '').trim();
    } else {
      const single = parts[0];
      const eqMatch = single.match(/^\s*=\s*(.*)/);
      if (eqMatch) {
        rhs = eqMatch[1].trim();
      } else {
        rhs = single;
      }
    }
    if (lhs) currentLhs = lhs;
    if (!rhs) return;

    equations.push({
      raw: (currentLhs ? currentLhs + ' = ' : '') + rhs,
      lhs: currentLhs || '',
      rhs: rhs,
      lineNum: idx + 1,
    });
  });
  return equations;
}

function matchBrace(s, pos) {
  if (s[pos] !== '{') return -1;
  let depth = 1;
  for (let i = pos + 1; i < s.length; i++) {
    if (s[i] === '{') depth++;
    else if (s[i] === '}') { depth--; if (depth === 0) return i; }
  }
  return -1;
}

function convertFracs(s) {
  let safety = 1000;
  while (s.includes('\\frac') && safety-- > 0) {
    const idx = s.indexOf('\\frac');
    let i = idx + 5;
    while (i < s.length && s[i] === ' ') i++;
    if (s[i] !== '{') break;
    const numStart = i;
    const numEnd = matchBrace(s, numStart);
    if (numEnd === -1) break;
    let j = numEnd + 1;
    while (j < s.length && s[j] === ' ') j++;
    if (s[j] !== '{') break;
    const denStart = j;
    const denEnd = matchBrace(s, denStart);
    if (denEnd === -1) break;
    const num = s.slice(numStart + 1, numEnd);
    const den = s.slice(denStart + 1, denEnd);
    s = s.slice(0, idx) + '((' + num + ')/(' + den + '))' + s.slice(denEnd + 1);
  }
  return s;
}

function convertSqrts(s) {
  let safety = 1000;
  while (/\\sqrt\[/.test(s) && safety-- > 0) {
    const m = s.match(/\\sqrt\[/);
    if (!m) break;
    const idx = s.indexOf('\\sqrt[');
    const bracketEnd = s.indexOf(']', idx + 6);
    if (bracketEnd === -1) break;
    const n = s.slice(idx + 6, bracketEnd);
    let bi = bracketEnd + 1;
    while (bi < s.length && s[bi] === ' ') bi++;
    if (s[bi] === '{') {
      const braceEnd = matchBrace(s, bi);
      if (braceEnd === -1) break;
      const body = s.slice(bi + 1, braceEnd);
      s = s.slice(0, idx) + '((' + body + ')**(1/(' + n + ')))' + s.slice(braceEnd + 1);
    } else break;
  }
  safety = 1000;
  while (s.includes('\\sqrt{') && safety-- > 0) {
    const idx = s.indexOf('\\sqrt{');
    const braceEnd = matchBrace(s, idx + 5);
    if (braceEnd === -1) break;
    const body = s.slice(idx + 6, braceEnd);
    s = s.slice(0, idx) + 'sqrt(' + body + ')' + s.slice(braceEnd + 1);
  }
  return s;
}

function latexToExpr(tex) {
  let s = tex;

  s = s.replace(/[−–—]/g, '-');
  
  s = s.replace(/^\$\$?|\$\$?$/g, '').trim();
  s = s.replace(/^\\\[|\\\]$/g, '').trim();
  s = s.replace(/^\\\(|\\\)$/g, '').trim();
  s = s.replace(/\\begin\{[^}]*\}/g, ' ');
  s = s.replace(/\\end\{[^}]*\}/g, ' ');
  s = s.replaceAll('&', ' ');
  s = s.replace(/\\\\/g, ' ');
  s = s.replace(/\{\\(?:rm|bf|it|cal|sf)\s+[^}]*\}/g, ' ');
  s = s.replace(/\\(?:rm|bf|it|cal|sf)\{[^}]*\}/g, ' ');

  s = s.replaceAll('\\times', ' * ');
  s = s.replaceAll('\\cdot', ' * ');

  s = s.replace(/([\d.]+)\s*\*\s*10\s*\^\{([^}]+)\}/g, (_, num, exp) => `${num} * 10**(${exp})`);
  s = s.replace(/([\d.]+)\s*\*\s*10\s*\^(-?\d+)/g, (_, num, exp) => `${num} * 10**(${exp})`);
  s = s.replace(/([\d.]+)\s*\*\s*10\s*\*\*\s*\(([^)]+)\)/g, (_, num, exp) => `${num} * 10**(${exp})`);

  s = s.replace(/(^|[^a-zA-Z_])e\s*\^\{/g, '$1e_n^{');
  s = s.replace(/(^|[^a-zA-Z_])e\s*\^([^{])/g, '$1e_n^$2');

  s = s.replaceAll('\\left(', '(').replaceAll('\\right)', ')');
  s = s.replaceAll('\\left[', '(').replaceAll('\\right]', ')');
  s = s.replaceAll('\\left\\{', '(').replaceAll('\\right\\}', ')');
  s = s.replaceAll('\\left|', 'abs(').replaceAll('\\right|', ')');
  s = s.replaceAll('\\bigl(', '(').replaceAll('\\bigr)', ')');
  s = s.replaceAll('\\Bigl(', '(').replaceAll('\\Bigr)', ')');

  s = s.replaceAll('\\div', ' / ');
  s = s.replaceAll('\\pm', '+');
  s = s.replaceAll('\\mp', '-');
  s = s.replaceAll('\\leq', '<=').replaceAll('\\geq', '>=');
  s = s.replaceAll('\\neq', '!=').replaceAll('\\approx', '==');

  s = s.replace(/\\(?:mathrm|text|textrm|textit|mathit|mathbf|textbf|operatorname)\{([^}]*)\}/g, '$1');

  const latexFuncs = ['ln','log','exp','sin','cos','tan','arcsin','arccos','arctan','sinh','cosh','tanh','sec','csc','cot'];
  for (const fn of latexFuncs) {
    s = s.replaceAll('\\' + fn, fn);
  }
  s = s.replaceAll('arcsin', 'asin').replaceAll('arccos', 'acos').replaceAll('arctan', 'atan');

  const greekMap = [
    ['\\varepsilon_0', 'eps_0'], ['\\epsilon_0', 'eps_0'], ['\\varepsilon_{0}', 'eps_0'], ['\\epsilon_{0}', 'eps_0'],
    ['\\hbar', 'hbar'], ['\\lambdabar', 'hbar'],
    ['\\mu_B', 'mu_B'], ['\\mu_{B}', 'mu_B'], ['\\mu_N', 'mu_N'], ['\\mu_{N}', 'mu_N'],
    ['\\alpha', 'alpha_fs'],
    ['\\sigma', 'sigma_SB'],
    ['\\lambda', 'lambda'],
    ['\\Lambda', 'Lambda'],
    ['\\omega', 'omega'], ['\\Omega', 'Omega'],
    ['\\phi', 'phi'], ['\\Phi', 'Phi'], ['\\varphi', 'phi'],
    ['\\theta', 'theta'], ['\\Theta', 'Theta'],
    ['\\beta', 'beta'], ['\\gamma', 'gamma'], ['\\Gamma', 'Gamma'],
    ['\\delta', 'delta'], ['\\Delta', 'Delta'],
    ['\\epsilon', 'epsilon'], ['\\varepsilon', 'epsilon'],
    ['\\zeta', 'zeta'], ['\\eta', 'eta'],
    ['\\kappa', 'kappa'], ['\\nu', 'nu'], ['\\mu', 'mu'],
    ['\\rho', 'rho'], ['\\tau', 'tau'], ['\\chi', 'chi'], ['\\psi', 'psi'],
    ['\\pi', 'pi'],
    ['\\infty', 'Infinity'],
  ];
  for (const [tex, rep] of greekMap) {
    s = s.replaceAll(tex, rep);
  }

  const physMap = [
    ['k_B', 'k_B'], ['k_{B}', 'k_B'], ['k_{\\mathrm{B}}', 'k_B'], ['k_\\mathrm{B}', 'k_B'],
    ['m_e', 'm_e'], ['m_{e}', 'm_e'], ['m_p', 'm_p'], ['m_{p}', 'm_p'],
    ['m_n', 'm_n'], ['m_{n}', 'm_n'], ['m_d', 'm_d'], ['m_{d}', 'm_d'],
    ['m_{\\alpha}', 'm_alpha'], ['N_A', 'N_A'], ['N_{A}', 'N_A'],
    ['a_0', 'a_0'], ['a_{0}', 'a_0'], ['R_{\\infty}', 'R_inf'], ['R_\\infty', 'R_inf'],
    ['E_1', 'E_1'], ['E_{1}', 'E_1'],
    ['e_n', 'e_n'], ['e_{n}', 'e_n'],
  ];
  for (const [tex, rep] of physMap) {
    s = s.replaceAll(tex, rep);
  }

  s = convertFracs(s);
  s = convertSqrts(s);

  let safety = 1000;
  while (/\^\{/.test(s) && safety-- > 0) {
    const idx = s.indexOf('^{');
    const braceEnd = matchBrace(s, idx + 1);
    if (braceEnd === -1) break;
    const body = s.slice(idx + 2, braceEnd);
    s = s.slice(0, idx) + '**(' + body + ')' + s.slice(braceEnd + 1);
  }
  s = s.replace(/\^([0-9])/g, '**$1');
  s = s.replace(/\^([a-zA-Z])/g, '**$1');

  safety = 1000;
  while (/_\{/.test(s) && safety-- > 0) {
    const idx = s.indexOf('_{');
    const braceEnd = matchBrace(s, idx + 1);
    if (braceEnd === -1) break;
    const body = s.slice(idx + 2, braceEnd);
    s = s.slice(0, idx) + '_' + body + s.slice(braceEnd + 1);
  }

  s = s.replace(/\\[,;!> ]/g, ' ');
  s = s.replace(/\\quad/g, ' ').replace(/\\qquad/g, ' ');
  s = s.replace(/\\(?:displaystyle|textstyle|scriptstyle)/g, '');
  s = s.replace(/\\([a-zA-Z]+)/g, '$1');

  s = s.replace(/\{([^{}]*)\}/g, '($1)');

  s = s.replace(/([0-9)])(\s*)(?![eE][+\-]?\d)([a-zA-Z_ℏπα])/g, '$1 * $3');
  
  s = s.replace(/([a-zA-Z_][a-zA-Z0-9_]*|[0-9]*\.?[0-9]+(?:[eE][+-]?[0-9]+)?|\))(\s*)\(/g, (match, p1, p2) => {
    if (MATH_FUNCS.has(p1)) return match;
    return p1 + ' * (';
  });

  let prevS;
  do { prevS = s; s = s.replace(/([a-zA-Z_][a-zA-Z0-9_]*)\s+([a-zA-Z_ℏπα][a-zA-Z0-9_]*)/g, '$1 * $2'); } while (s !== prevS);
  s = s.replace(/\)\s*([0-9])/g, ') * $1');
  
  for (const fn of ['ln']) {
    s = s.replaceAll(fn + ' * (', fn + '(');
  }

  s = s.replace(/\s+/g, ' ').trim();
  s = balanceParens(s);
  
  return s;
}

function parseExprTokens(expr) {
  const cleaned = expr.replace(/[\d.]+[eE][+\-]?\d+/g, '');
  const words = cleaned.match(/[a-zA-Z_ℏπα][a-zA-Z0-9_]*/g) || [];
  const unique = [...new Set(words)];
  const consts = [];
  const vars = [];
  unique.forEach(w => {
    if (MATH_FUNCS.has(w) || UNIT_TOKENS.has(w)) return;
    if (w === "pi" || w === "π") return;
    const km = KEYWORD_MAP[w];
    if (km) {
      const data = km.source === "const" ? CONSTANTS[km.constKey] : PARTICLES[km.constKey];
      consts.push({ token: w, ...km, data });
    } else {
      vars.push(w);
    }
  });
  return { consts, vars };
}

function buildReplacements(unitSys) {
  const map = {};
  const s = unitSys;
  for (const [, c] of Object.entries(CONSTANTS)) {
    const v = s === "si" ? c.si : c.ev;
    for (const k of c.keys) map[k] = v;
  }
  for (const [, p] of Object.entries(PARTICLES)) {
    const v = s === "si" ? p.si : p.ev;
    for (const k of p.keys) map[k] = v;
  }
  return map;
}

function evalExpr(expr, unitSys, varValues = {}) {
  try {
    let s = expr;
    const reps = buildReplacements(unitSys);
    const allReps = { ...reps, ...varValues };
    
    s = s.replace(/([0-9]*\.?[0-9]+[eE][+-]?[0-9]+)|([a-zA-Z_ℏπα][a-zA-Z0-9_]*)/g, (match, isNum, isVar) => {
      if (isNum) return match; 
      if (isVar && allReps.hasOwnProperty(isVar)) {
        return `(${allReps[isVar]})`;
      }
      return match;
    });
    
    s = s.replace(/\bMeV\b/g, `(${unitSys === "si" ? 1e6*eVtoJ : 1e6})`);
    s = s.replace(/\bkeV\b/g, `(${unitSys === "si" ? 1e3*eVtoJ : 1e3})`);
    s = s.replace(/\bGeV\b/g, `(${unitSys === "si" ? 1e9*eVtoJ : 1e9})`);
    s = s.replace(/\beV\b/g,  `(${unitSys === "si" ? eVtoJ : 1})`);
    
    s = s.replaceAll('π', `(${Math.PI})`);
    s = s.replace(/\bpi\b/g, `(${Math.PI})`);
    s = s.replaceAll('^', '**');
    
    s = s.replace(/\*\*\s*-\s*([a-zA-Z0-9_.]+)/g, '**(-$1)');
    s = s.replace(/\*\*\s*\+\s*([a-zA-Z0-9_.]+)/g, '**($1)');

    s = s.replaceAll('×', '*');
    
    for (const fn of ['sqrt','cbrt','exp','log','abs','pow','sin','cos','tan','asin','acos','atan','floor','ceil','round','max','min']) {
      s = s.replace(new RegExp(`\\b${fn}\\(`, 'g'), 'Math.' + fn + '(');
    }
    s = s.replace(/\bln\(/g, 'Math.log(');
    
    s = s.replaceAll('Math.Math.', 'Math.');
    s = balanceParens(s);
    
    const result = Function('"use strict"; return (' + s + ')')();
    
    if (typeof result === 'number' && !isNaN(result)) return result;
    return null;
  } catch(err) { 
    return null; 
  }
}

function LatexRenderer({ tex, displayMode = false, style, katexReady }) {
  const containerRef = useRef(null);
  
  useEffect(() => {
    if (katexReady && window.katex && containerRef.current) {
      try {
        window.katex.render(tex, containerRef.current, {
          throwOnError: false,
          displayMode: displayMode,
          errorColor: "#e86a6a"
        });
      } catch (e) {
        containerRef.current.textContent = tex;
      }
    } else if (containerRef.current && !katexReady) {
      containerRef.current.textContent = tex;
    }
  }, [tex, katexReady, displayMode]);

  return <span ref={containerRef} style={{ ...style, fontFamily: katexReady ? undefined : monoFont }} />;
}

function ParamInput({ param, value, onChange }) {
  const [mantissa, setMantissa] = useState("");
  const [exponent, setExponent] = useState("");
  const init = useRef(false);
  useEffect(() => {
    if (!init.current) { init.current = true; if (param.scientific && value) { const exp = Math.floor(Math.log10(Math.abs(value))); setMantissa((value / Math.pow(10, exp)).toPrecision(4)); setExponent(String(exp)); } }
  }, []);
  if (param.scientific) {
    return (
      <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
        <label style={{ color: "#8899bb", fontSize: 12, minWidth: 80 }}>{param.label}</label>
        <input type="text" value={mantissa} onChange={(ev) => { setMantissa(ev.target.value); const m=parseFloat(ev.target.value),e=parseInt(exponent)||0; if(!isNaN(m)) onChange(m*Math.pow(10,e)); }} style={{width:70,...inputStyle}} />
        <span style={{ color: "#5577aa", fontSize: 13 }}>×10^</span>
        <input type="text" value={exponent} onChange={(ev) => { setExponent(ev.target.value); const m=parseFloat(mantissa)||0,e=parseInt(ev.target.value); if(!isNaN(e)) onChange(m*Math.pow(10,e)); }} style={{width:44,...inputStyle}} />
        <span style={{ color: "#5577aa", fontSize: 11, marginLeft: 4 }}>{param.unit}</span>

      <label style={{ color: "#8899bb", fontSize: 12, minWidth: 80 }}>{param.label}</label>

  );
}

function App() {
  const [tab, setTab] = useState("expr");
  const [katexReady, setKatexReady] = useState(false);
  
  useEffect(() => {
    if (window.katex) { setKatexReady(true); return; }
    if (document.querySelector('#katex-script')) {
       const check = setInterval(() => { if(window.katex) { setKatexReady(true); clearInterval(check); } }, 100);
       return () => clearInterval(check);
    }
    
    const link = document.createElement("link");
    link.rel = "stylesheet";
    link.href = "https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css";
    document.head.appendChild(link);
    
    const script = document.createElement("script");
    script.id = "katex-script";
    script.src = "https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js";
    script.onload = () => setKatexReady(true);
    document.head.appendChild(script);
  }, []);

  const [expr, setExpr] = useState("");
  const [exprResult, setExprResult] = useState(null);
  const [unitSys, setUnitSys] = useState("si"); 
  const [resultDim, setResultDim] = useState("energy");
  const [varValues, setVarValues] = useState({});
  const [varMultipliers, setVarMultipliers] = useState({});
  
  const [parsed, setParsed] = useState(null);
  const [convertedExpr, setConvertedExpr] = useState(null);
  const [latexLines, setLatexLines] = useState([]);
  const [selectedLineIdx, setSelectedLineIdx] = useState(-1);
  const [displayLhs, setDisplayLhs] = useState("");

  const getPresetForVar = useCallback((name) => {
    if (!name) return null;
    const norm = name.replace(/\\/g, '').replace(/[{}]/g, '').trim();
    if (norm === 'E_F') return EXPR_PRESETS.find(p => p.label.includes("Fermi Energy"));
    if (norm === 'lambda' || norm === 'lamda') return EXPR_PRESETS.find(p => p.label.includes("de Broglie Wavelength (by p)"));
    if (norm === 'p') return EXPR_PRESETS.find(p => p.label.includes("Momentum p"));
    if (norm === 'N') return EXPR_PRESETS.find(p => p.label.includes("Total Neutron Number"));
    if (norm === 'V') return EXPR_PRESETS.find(p => p.label.includes("Volume of Sphere"));
    if (norm === 'R') return EXPR_PRESETS.find(p => p.label.includes("Neutron Star Radius"));
    
    if (norm === 'E_n') return EXPR_PRESETS.find(p => p.label.includes("Bohr Energy"));
    if (norm === 'd') return EXPR_PRESETS.find(p => p.label.includes("Avg Particle Distance"));
    if (norm === 'mu') return EXPR_PRESETS.find(p => p.label.includes("Reduced Mass"));
    if (norm === 'E_L') return EXPR_PRESETS.find(p => p.label.includes("Rotational Energy"));
    if (norm === 'I') return EXPR_PRESETS.find(p => p.label.includes("Moment of Inertia"));
    if (norm === 'omega') return EXPR_PRESETS.find(p => p.label.includes("Vibrational Angular Freq"));
    return null;
  }, []);

  const topPreset = useMemo(() => getPresetForVar(displayLhs), [displayLhs, getPresetForVar]);

  const [selectedFormula, setSelectedFormula] = useState(FORMULAS[0].id);
  const [formulaParams, setFormulaParams] = useState(() => {
    const i = {}; FORMULAS.forEach(f => { i[f.id] = {}; f.params.forEach(p => { i[f.id][p.key] = p.default; }); }); return i;
  });
  const [constFilter, setConstFilter] = useState("");
  const inputRef = useRef(null);

  const formula = useMemo(() => FORMULAS.find(f => f.id === selectedFormula), [selectedFormula]);
  const formulaResult = useMemo(() => {
    if (!formula) return null;
    return formula.calc(formulaParams[formula.id] || {});
  }, [formula, formulaParams, selectedFormula]);

  // 1. Top-level Parsing
  useEffect(() => {
    if (!expr.trim()) {
      setParsed(null); setConvertedExpr(null); setLatexLines([]); setSelectedLineIdx(-1); setDisplayLhs("");
      return;
    }
    const latex = isLatex(expr);
    const multi = latex && isMultiLineLatex(expr);

    if (multi) {
      const lines = parseLatexBlock(expr);
      setLatexLines(lines);
      const symbIdx = lines.findIndex(l => /[a-zA-Z\\]/.test(l.rhs));
      const idx = symbIdx >= 0 ? symbIdx : 0;
      setSelectedLineIdx(lines.length > 0 ? idx : -1);
      if (lines.length > 0) {
        const conv = latexToExpr(lines[idx].rhs);
        setConvertedExpr(conv);
        setDisplayLhs(lines[idx].lhs || "");
        const p = parseExprTokens(conv);
        setParsed(p);
        setVarValues(prev => {
          const next = { ...prev };
          p.vars.forEach(v => { if (!(v in next)) next[v] = ""; });
          return next;
        });
      }
    } else {
      setLatexLines([]);
      setSelectedLineIdx(-1);
      
      let rawStr = expr.trim();
      let extractedLhs = "";
      let extractedRhs = rawStr;

      let depth = 0, topLevelEq = -1;
      for (let i = 0; i < rawStr.length; i++) {
        if (rawStr[i] === '(' || rawStr[i] === '{' || rawStr[i] === '[') depth++;
        else if (rawStr[i] === ')' || rawStr[i] === '}' || rawStr[i] === ']') depth--;
        else if (rawStr[i] === '=' && depth === 0 && rawStr[i-1] !== '<' && rawStr[i-1] !== '>' && rawStr[i-1] !== '!' && rawStr[i+1] !== '=') {
          topLevelEq = i;
          break;
        }
      }
      if (topLevelEq > 0) {
        extractedLhs = rawStr.slice(0, topLevelEq).trim();
        extractedRhs = rawStr.slice(topLevelEq + 1).trim();
      }
      setDisplayLhs(extractedLhs);

      const isRhsLatex = isLatex(extractedRhs);
      const exprToAnalyze = isRhsLatex ? latexToExpr(extractedRhs) : extractedRhs;
      setConvertedExpr(isRhsLatex ? exprToAnalyze : null);
      const p = parseExprTokens(exprToAnalyze);
      setParsed(p);
      setVarValues(prev => {
        const next = { ...prev };
        p.vars.forEach(v => { if (!(v in next)) next[v] = ""; });
        return next;
      });
    }
  }, [expr]);

  // 2. Build Dependency Tree & Evaluate Recursively
  const { displayList, evaluatedVars, finalResult } = useMemo(() => {
    if (!parsed || !parsed.vars) return { displayList: [], evaluatedVars: {}, finalResult: null };

    const list = [];
    const visitedUI = new Set();
    
    const buildUI = (vName, depth) => {
        if (visitedUI.has(vName)) return;
        visitedUI.add(vName);

        const rawInput = varValues[vName] || "";
        let cleanRaw = rawInput;
        if (cleanRaw.startsWith(vName + '=') || cleanRaw.startsWith(vName + ' =')) {
            cleanRaw = cleanRaw.substring(cleanRaw.indexOf('=')+1).trim();
        }

        const processedRaw = latexToExpr(cleanRaw);
        const tokens = parseExprTokens(processedRaw);

        list.push({
            name: vName,
            depth,
            tokens,
            previewTex: isLatex(cleanRaw) ? cleanRaw : null,
            cleanRaw,
            processedRaw
        });

        tokens.vars.forEach(dep => buildUI(dep, depth + 1));
    };

    parsed.vars.forEach(v => buildUI(v, 0));

    const evaluated = {};
    const evaluating = new Set();

    const evaluateVar = (vName) => {
        if (evaluated[vName] !== undefined) return evaluated[vName];
        if (evaluating.has(vName)) return null; 
        evaluating.add(vName);

        const item = list.find(x => x.name === vName);
        if (!item || !item.cleanRaw.trim()) {
            evaluated[vName] = null;
            return null;
        }

        const depValues = {};
        let depsValid = true;
        for (const dep of item.tokens.vars) {
            const dVal = evaluateVar(dep);
            if (dVal === null || isNaN(dVal)) depsValid = false;
            depValues[dep] = dVal;
        }

        let val = null;
        if (depsValid || Object.keys(depValues).length === item.tokens.vars.length) {
            val = evalExpr(item.processedRaw, unitSys, depValues);
            if (val !== null && varMultipliers[vName]) {
                val *= varMultipliers[vName];
            }
        }

        evaluated[vName] = val;
        evaluating.delete(vName);
        return val;
    };

    const mainDepValues = {};
    let isMainValid = true;
    parsed.vars.forEach(v => {
        const val = evaluateVar(v);
        if (val === null || isNaN(val)) isMainValid = false;
        mainDepValues[v] = val;
    });

    let mainRes = null;
    const finalExprTarget = convertedExpr || (displayLhs ? expr.substring(expr.indexOf('=')+1) : expr);
    if (isMainValid && finalExprTarget) {
        mainRes = evalExpr(finalExprTarget, unitSys, mainDepValues);
    }

    return { displayList: list, evaluatedVars: evaluated, finalResult: mainRes };

  }, [parsed, varValues, varMultipliers, unitSys, convertedExpr, expr, displayLhs]);

  useEffect(() => {
    setExprResult(finalResult);
  }, [finalResult]);

  const handleConstInsert = useCallback((insertKey) => {
    setExpr(prev => prev + insertKey);
    inputRef.current?.focus();

      setDisplayLhs(latexLines[idx].lhs || "");
      const p = parseExprTokens(conv);
      setParsed(p);
      setVarValues(prev => {
        const next = {};
        p.vars.forEach(v => { next[v] = prev[v] || ""; });
        return next;
      });
      setVarMultipliers({});
    }
  }, [latexLines]);

  const exprConversions = useMemo(() => {
    if (exprResult === null || !isFinite(exprResult)) return [];
    const dim = DIMENSIONS[resultDim];
    return dim ? dim.conversions(exprResult, unitSys) : [];
  }, [exprResult, resultDim, unitSys]);

  const secTitle = { color: "#4a7ab5", fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: 1.5, marginBottom: 8, marginTop: 4 };
  const tabSt = (a) => ({ background: a?"rgba(40,80,140,0.5)":"transparent", border: a?"1px solid rgba(100,160,255,0.4)":"1px solid transparent", borderRadius: 6, padding: "7px 14px", cursor: "pointer", color: a?"#a0ccff":"#5577aa", fontSize: 12, fontWeight: 600, transition: "all 0.15s", letterSpacing: 0.5 });
  const cv = (c) => unitSys==="si"?c.si:c.ev;
  const cu = (c) => unitSys==="si"?c.siU:c.evU;

  return (
    <div style={{ fontFamily: "'IBM Plex Sans', 'Noto Sans KR', sans-serif", background: "linear-gradient(145deg, #0a0f1a 0%, #0f1a2e 50%, #0a1020 100%)", color: "#c8daf0", minHeight: "100vh" }}>
      <style>{`

        * { box-sizing: border-box; margin: 0; padding: 0; }

        select option { background: #0f1a2e; color: #c8daf0; }
        textarea { font-family: 'IBM Plex Mono', monospace; }
        textarea::placeholder { color: rgba(90,120,160,0.5); }
        .katex-display { margin: 0 !important; }
      `}</style>

      {/* Header */}
      <div style={{ padding: "16px 20px 12px", borderBottom: "1px solid rgba(60,90,140,0.2)", background: "rgba(10,15,30,0.5)" }}>

        <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>

                  <div style={{ color: "#3a5a7a", fontSize: 9, marginTop: 3, fontFamily: monoFont }}>Key: {c.keys.join(", ")}</div>

            </div>

            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(180px, 1fr))", gap: 6 }}>
              {Object.entries(CONVERSIONS).map(([k, c]) => (
                <div key={k} style={{ background: cardBg, borderRadius: 6, border: "1px solid rgba(60,90,140,0.15)", padding: "8px 10px" }}>
                  <span style={{ color: "#7eb8ff", fontSize: 12, fontFamily: monoFont }}>{c.name}</span>
                  <span style={{ color: "#4a6a90" }}> = </span>
                  <span style={{ color: "#c8daf0", fontSize: 12, fontFamily: monoFont }}>{fmt(c.value, 6)} {c.unit}</span>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* ══════════════ PARTICLES TAB ══════════════ */}
        {tab === "particles" && (
          <div>
            <div style={secTitle}>Particle Masses</div>
            <div style={{ background: cardBg, borderRadius: 8, border: cardBorder, overflow: "hidden" }}>
              <table style={{ width: "100%", borderCollapse: "collapse", fontFamily: monoFont, fontSize: 12 }}>
                <thead><tr style={{ background: "rgba(20,35,60,0.6)" }}>
                  {["Particle","kg","u","MeV/c²","Formula Key"].map(h => <th key={h} style={{ padding: "8px 10px", textAlign: "left", color: "#5a8abb", fontWeight: 600, borderBottom: cardBorder }}>{h}</th>)}
                </tr></thead>
                <tbody>{Object.entries(PARTICLES).map(([k,p]) => (
                  <tr key={k} style={{ borderBottom: "1px solid rgba(60,90,140,0.1)" }}>
                    <td style={{ padding: "7px 10px", color: "#7eb8ff", fontWeight: 600 }}>{p.symbol}</td>
                    <td style={{ padding: "7px 10px", color: "#c8daf0" }}>{p.si.toExponential(7)}</td>
                    <td style={{ padding: "7px 10px", color: "#c8daf0" }}>{p.u}</td>
                    <td style={{ padding: "7px 10px", color: "#c8daf0" }}>{p.mev}</td>
                    <td style={{ padding: "7px 10px", color: "#3a5a7a", fontSize: 10 }}>{p.keys.join(", ")}</td>
                  </tr>
                ))}</tbody>
              </table>
            </div>
            <div style={{ ...secTitle, marginTop: 16 }}>Prefixes</div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(140px, 1fr))", gap: 4 }}>
              {PREFIXES.map(p => (
                <div key={p.name} style={{ background: cardBg, borderRadius: 6, border: "1px solid rgba(60,90,140,0.15)", padding: "6px 10px", display: "flex", justifyContent: "space-between" }}>
                  <span style={{ color: "#8899bb", fontSize: 12 }}>{p.name} ({p.abbr})</span>
                  <span style={{ color: "#7eb8ff", fontSize: 12, fontFamily: monoFont }}>10^{p.exp}</span>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* ══════════════ EXPRESSION CALCULATOR ══════════════ */}
        {tab === "expr" && (
          <div>
            {/* ── Row 1: Unit system + Dimension ── */}
            <div style={{ display: "flex", gap: 16, marginBottom: 14, flexWrap: "wrap" }}>
              <div>
                <div style={{ ...secTitle, marginBottom: 6 }}>Unit System</div>
                <div style={{ display: "flex", gap: 4 }}>
                  <Chip active={unitSys==="ev"} label="eV System" onClick={() => setUnitSys("ev")} accent="green" />
                  <Chip active={unitSys==="si"} label="SI System" onClick={() => setUnitSys("si")} />
                </div>
              </div>
              <div>
                <div style={{ ...secTitle, marginBottom: 6 }}>Result Dimension (Auto Convert)</div>
                <div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>
                  {Object.entries(DIMENSIONS).map(([k,d]) => <Chip key={k} active={resultDim===k} label={d.label} onClick={() => setResultDim(k)} accent="purple" />)}
                </div>
              </div>
            </div>

            {/* ── Row 2: Preset dropdown ── */}
            <div style={{ marginBottom: 12 }}>
              <div style={{ ...secTitle, marginBottom: 6 }}>Preset Expressions (Optional)</div>
              <select
                value=""
                onChange={(ev) => { 
                  if (ev.target.value !== "") { 
                    const sel = EXPR_PRESETS[parseInt(ev.target.value)];
                    setExpr(sel.expr); 
                    setVarValues(sel.varValues || {}); 
                    setVarMultipliers({});

                    setExpr("");
                    setVarValues({});
                    setVarMultipliers({});

              >
                <option value="">-- Select a preset --</option>

              {unitSys==="ev" ? (<>
                <strong style={{ color: "#7ecc8f" }}>eV System Note:</strong> Mass constants are precisely applied in <strong>eV/c²</strong> ($m_e \approx 5.11 \times 10^5$). When calculating energy, using $\hbar c$ or $hc$ (eV·nm) rather than $h$ (eV·s) aligns lengths perfectly in nm.
              </>) : (<>
                <strong style={{ color: "#7eb8ff" }}>SI System</strong> — k_B→1.381×10⁻²³ J/K | ℏ→1.055×10⁻³⁴ J·s | m_e→9.109×10⁻³¹ kg | eV→1.602×10⁻¹⁹ (Conversion factor)

            {/* ── Expression input ── */}
            <div style={{ background: cardBg, borderRadius: 8, border: cardBorder, padding: 14, marginBottom: 12 }}>
              <div style={{ ...secTitle, marginTop: 0, marginBottom: 8 }}>Expression Input <span style={{ fontWeight: 400, textTransform: "none", letterSpacing: 0, color: "#5a7a9a" }}>— Normal expression, LaTeX, or align block</span></div>
              
              {/* 스마트 프리셋 제안 (메인) */}
              {topPreset && (!expr.includes(topPreset.expr)) && (
                <div style={{ background: "rgba(160,120,60,0.15)", border: "1px solid rgba(180,140,60,0.4)", borderRadius: 6, padding: "8px 12px", marginBottom: 10, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                  <div style={{ color: "#ddbb66", fontSize: 12 }}>
                    💡 Found matching preset: <strong>'{topPreset.label}'</strong>
                  </div>
                  <button onClick={() => { setExpr(displayLhs ? displayLhs + " = " + topPreset.expr : topPreset.expr); setVarValues(topPreset.varValues || {}); setVarMultipliers({}); }} style={{ background: "rgba(180,140,60,0.3)", border: "1px solid rgba(200,160,80,0.4)", borderRadius: 4, padding: "4px 8px", color: "#eedd99", fontSize: 11, cursor: "pointer" }}>
                    Load Preset
                  </button>
                </div>
              )}

              <div style={{ display: "flex", gap: 6, marginBottom: 10, alignItems: "flex-start" }}>
                <textarea ref={inputRef} value={expr}

                  placeholder={"e.g.: E_F = \\frac{\\hbar^{2}}{2 m_e} (3\\pi^{2} n)^{2/3}\nOr paste complex equation block"}
                  rows={expr.includes('\n') || expr.includes('\\begin') ? 6 : 2}
                  style={{ flex: 1, ...inputStyle, borderRadius: 6, padding: "8px 12px", fontSize: 13, resize: "vertical", lineHeight: 1.5, minHeight: 38 }} />
                <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                  <button onClick={() => { setExpr(""); setVarValues({}); setVarMultipliers({}); }} style={{
                    background: "rgba(60,30,30,0.4)", border: "1px solid rgba(200,100,100,0.2)",
                    borderRadius: 6, padding: "8px 12px", color: "#cc8888", fontSize: 13, cursor: "pointer",
                  }}>Clear</button>
                </div>
              </div>

              {/* ── Live LaTeX Preview ── */}
              {expr.trim() && isLatex(expr) && (
                <div style={{ background: "rgba(20,30,40,0.6)", padding: "10px 14px", borderRadius: 6, marginTop: 10, border: "1px solid rgba(100,140,200,0.2)", overflowX: "auto" }}>
                  <div style={{ fontSize: 10, color: "#8899bb", marginBottom: 6, textTransform: "uppercase", letterSpacing: 1 }}>Live LaTeX Preview</div>
                  <div style={{ color: "#e0ecff", paddingBottom: 4 }}>
                    <LatexRenderer tex={expr.replace(/align\*/g, 'aligned')} displayMode={true} katexReady={katexReady} />

              {/* ── Multi-line equation selector ── */}
              {latexLines.length > 1 && (
                <div style={{ background: "rgba(40,50,30,0.25)", borderRadius: 6, border: "1px solid rgba(140,160,80,0.25)", padding: "10px 10px", marginTop: 10, marginBottom: 10 }}>

                  </div>
                  <div style={{ display: "flex", flexDirection: "column", gap: 3 }}>

                      const tokens = parseExprTokens(convPreview);
                      const isSymbolic = tokens.vars.length > 0 || tokens.consts.length > 0;
                      return (
                        <button key={idx} onClick={() => handleLineSelect(idx)} style={{
                          display: "block", width: "100%", textAlign: "left",

                          </div>
                          <div style={{ fontFamily: monoFont, fontSize: 11, color: isSelected ? "#d0e8a0" : "#8899aa", marginTop: 3, lineHeight: 1.4, wordBreak: "break-all" }}>
                            {line.lhs && <span style={{ color: isSelected ? "#c0d880" : "#7a8866" }}>{line.lhs} = </span>}
                            {line.rhs.length > 100 ? line.rhs.slice(0, 100) + '...' : line.rhs}
                          </div>
                          {isSelected && (
                            <div style={{ fontFamily: monoFont, fontSize: 10, color: "#99aa77", marginTop: 2 }}>
                              → {convPreview.length > 120 ? convPreview.slice(0, 120) + '...' : convPreview}
                            </div>
                          )}
                        </button>
                      );
                    })}
                  </div>
                </div>
              )}

              {/* ── LaTeX detected: show converted expression ── */}
              {convertedExpr && (
                <div style={{ background: "rgba(60,40,80,0.25)", borderRadius: 6, border: "1px solid rgba(140,100,200,0.3)", padding: "8px 12px", marginTop: 10, marginBottom: 10 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 4 }}>
                    <span style={{ background: "rgba(140,100,200,0.4)", color: "#d0b8ff", fontSize: 9, fontWeight: 700, padding: "2px 6px", borderRadius: 3, textTransform: "uppercase", letterSpacing: 1 }}>LaTeX Detected</span>
                    <span style={{ color: "#9a80cc", fontSize: 10 }}>Automatically converted to evaluable expression</span>
                  </div>
                  <div style={{ fontFamily: monoFont, fontSize: 12, color: "#c8b0ee", lineHeight: 1.6, wordBreak: "break-all" }}>
                    → {convertedExpr}
                  </div>
                </div>
              )}

              {/* ── Auto-detected: constants ── */}
              {parsed && parsed.consts.length > 0 && (
                <div style={{ background: "rgba(20,50,60,0.3)", borderRadius: 6, border: "1px solid rgba(60,140,120,0.2)", padding: "8px 10px", marginBottom: 10 }}>
                  <div style={{ color: "#5aaa88", fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: 1, marginBottom: 4 }}>Detected Constants</div>
                  {parsed.consts.map(c => {
                    const val = unitSys === "si" ? c.data.si : c.data.ev;
                    const unit = unitSys === "si" ? c.data.siU : c.data.evU;
                    return (
                      <div key={c.token} style={{ fontFamily: monoFont, fontSize: 11, color: "#7ecbaa", lineHeight: 1.6 }}>
                        <strong>{c.token}</strong> = {fmt(val, 6)} {unit} <span style={{ color: "#4a7a6a" }}>({c.data.name})</span>
                      </div>
                    );
                  })}
                </div>
              )}

              {/* ── Auto-detected: Hierarchical variables ── */}
              {displayList.length > 0 && (
                <div style={{ background: "rgba(50,40,20,0.3)", borderRadius: 6, border: "1px solid rgba(180,140,60,0.2)", padding: "10px 10px", marginBottom: 10 }}>
                  <div style={{ color: "#ccaa55", fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: 1, marginBottom: 8 }}>Variables (Auto-detects nested variables)</div>
                  <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                    {displayList.map(item => {
                      const evaluatedVal = evaluatedVars[item.name];
                      const isValid = evaluatedVal !== null && typeof evaluatedVal === 'number' && !isNaN(evaluatedVal) && isFinite(evaluatedVal);
                      const indent = Math.min(item.depth * 24, 140);
                      const activeMultiplier = varMultipliers[item.name] || 1;
                      
                      const varPreset = getPresetForVar(item.name);
                      const showVarPreset = varPreset && !(varValues[item.name] && varValues[item.name].includes(varPreset.expr));

                      return (
                        <div key={item.name} style={{ display: "flex", flexDirection: "column", gap: 4, marginLeft: indent, borderLeft: item.depth > 0 ? "2px solid rgba(180,140,60,0.4)" : "none", paddingLeft: item.depth > 0 ? 12 : 0, marginTop: item.depth > 0 ? 6 : 0 }}>
                          
                          {showVarPreset && (
                            <div style={{ background: "rgba(160,120,60,0.15)", border: "1px solid rgba(180,140,60,0.3)", borderRadius: 6, padding: "6px 10px", marginBottom: 4, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                              <div style={{ color: "#ddbb66", fontSize: 11 }}>
                                💡 Suggested Preset: <strong>{varPreset.label}</strong>
                              </div>
                              <button onClick={() => { setVarValues(prev => ({ ...prev, [item.name]: varPreset.expr, ...(varPreset.varValues || {}) })); }} style={{ background: "rgba(180,140,60,0.3)", border: "1px solid rgba(200,160,80,0.3)", borderRadius: 4, padding: "3px 8px", color: "#eedd99", fontSize: 11, cursor: "pointer" }}>
                                Apply
                              </button>
                            </div>
                          )}

                          <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                            <label style={{ color: "#ddbb66", fontSize: 13, fontWeight: 600, fontFamily: monoFont, minWidth: 40, textAlign: "right" }}>
                              <LatexRenderer tex={item.name} katexReady={katexReady} displayMode={false} /> =
                            </label>
                            <input
                              type="text"
                              value={varValues[item.name] || ""}
                              onChange={(ev) => setVarValues(prev => ({ ...prev, [item.name]: ev.target.value }))}
                              placeholder="Input constant or expression (LaTeX supported)"
                              style={{ flex: 1, minWidth: 180, ...inputStyle, borderRadius: 6, padding: "6px 10px", borderColor: "rgba(180,140,60,0.3)" }}
                            />
                            <select 
                              value={activeMultiplier} 
                              onChange={(ev) => setVarMultipliers(prev => ({ ...prev, [item.name]: parseFloat(ev.target.value) }))}
                              style={{ background: "rgba(30,20,10,0.5)", border: "1px solid rgba(180,140,60,0.3)", color: "#cca060", borderRadius: 6, padding: "5px 8px", fontSize: 11, fontFamily: monoFont, minWidth: 140 }}
                            >
                              {MAGNITUDES.map(mag => (
                                <option key={mag.label} value={mag.val}>{mag.label}</option>
                              ))}
                            </select>
                          </div>
                          {(item.previewTex || isValid) && (
                            <div style={{ paddingLeft: 68, display: "flex", flexDirection: "column", gap: 4 }}>
                              {item.previewTex && (
                                <div style={{ color: "#c8b0ee", fontSize: 12, overflowX: "auto" }}>
                                  <LatexRenderer tex={item.previewTex} katexReady={katexReady} displayMode={false} />
                                </div>
                              )}
                              {isValid && (
                                <div style={{ color: "#8899aa", fontSize: 11, fontFamily: monoFont }}>
                                  {item.previewTex ? "↳ " : "= "}{fmt(evaluatedVal)}
                                  {activeMultiplier !== 1 && <span style={{color: "#bba866"}}> (Prefix applied)</span>}
                                </div>
                              )}
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}

              {displayList.length === 0 && expr.trim() && (
                <div style={{ color: "#5577aa", fontSize: 11, marginBottom: 6 }}>All tokens are built-in constants — Ready to evaluate</div>
              )}

              {/* ── Result ── */}
              {exprResult !== null && (
                <div style={{ background: "rgba(20,40,80,0.4)", borderRadius: 6, border: "1px solid rgba(80,130,220,0.3)", padding: "10px 14px" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                    {displayLhs ? (
                      <LatexRenderer 
                        tex={displayLhs + " ="} 
                        katexReady={katexReady} 
                        style={{ fontSize: 20, color: "#a0ccff", display: "inline-block" }} 
                      />
                    ) : (
                      <span style={{ color: "#5a8abb", fontSize: 20 }}>= </span>
                    )}
                    <span style={{ fontFamily: monoFont, fontSize: 26, fontWeight: 600, color: "#7eb8ff" }}>{fmt(exprResult)}</span>
                    {(exprResult !== 0 && isFinite(exprResult) && (Math.abs(exprResult) < 1e-3 || Math.abs(exprResult) >= 1e5)) ? (
                      <span style={{ fontFamily: monoFont, fontSize: 14, color: "#5a8abb", marginLeft: 4 }}>({formatReadableSci(exprResult)})</span>
                    ) : null}
                  </div>
                </div>
              )}
            </div>

            {/* ── Auto conversions ── */}
            {exprResult !== null && isFinite(exprResult) && resultDim !== "none" && exprConversions.length > 0 && (
              <div style={{ marginBottom: 14 }}>
                <div style={secTitle}>Auto Conversions — {DIMENSIONS[resultDim].label}</div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(170px, 1fr))", gap: 5 }}>
                  {exprConversions.map(c => (
                    <div key={c.label} style={{ background: "rgba(20,35,60,0.45)", borderRadius: 6, border: "1px solid rgba(60,90,140,0.2)", padding: "7px 10px" }}>
                      <div style={{ color: "#5a8abb", fontSize: 10, marginBottom: 2, fontWeight: 600 }}>{c.label}</div>
                      <div style={{ color: "#c8daf0", fontSize: 13, fontFamily: monoFont, fontWeight: 500 }}>{fmt(c.val)}</div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* ── Quick insert buttons ── */}
            <div style={secTitle}>Click constant to insert — <span style={{ color: unitSys==="ev"?"#7ecc8f":"#7eb8ff" }}>{unitSys==="ev"?"eV":"SI"} Value</span></div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(140px, 1fr))", gap: 4, marginBottom: 12 }}>
              {Object.entries(CONSTANTS).map(([k, c]) => (
                <ConstantButton key={k} label={c.symbol} subLabel={`${fmt(cv(c), 5)} ${cu(c)}`} onClick={() => handleConstInsert(c.keys[0])} />
              ))}
            </div>
            <div style={secTitle}>Particle Masses</div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(140px, 1fr))", gap: 4, marginBottom: 12 }}>
              {Object.entries(PARTICLES).map(([k, c]) => (
                <ConstantButton key={k} label={c.symbol} subLabel={`${fmt(unitSys==="si"?c.si:c.ev, 5)} ${unitSys==="si"?c.siU:c.evU}`} onClick={() => handleConstInsert(c.keys[0])} />
              ))}
            </div>

            {/* ── Help ── */}
            <div style={{ background: "rgba(15,25,45,0.3)", borderRadius: 6, padding: 10, border: "1px solid rgba(60,90,140,0.15)" }}>
              <div style={{ color: "#4a6a90", fontSize: 11, lineHeight: 1.8 }}>
                <strong style={{ color: "#5a8abb" }}>Workflow:</strong> ① Select unit system → ② Input expression (Normal/LaTeX/align) → ③ Enter variables → ④ Auto calculation<br/>
                <strong style={{ color: "#5a8abb" }}>Operators:</strong> + - * / ^(exponent) sqrt() cbrt() exp() ln() sin() cos() tan() π<br/>
                <strong style={{ color: "#5a8abb" }}>Euler's Number:</strong> e_n (= 2.71828...) — e.g., e_n**(-lambda * t)<br/>
                <strong style={{ color: "#b090dd" }}>LaTeX:</strong> \frac, \sqrt, \sqrt[n], \hbar, \pi, ^{'{}'}, _{'{}'}, \times, \cdot, \left/\right<br/>
                <strong style={{ color: "#aacc55" }}>Multi-line:</strong> Paste \begin{'{'}align*{'}'}... block → Parsed line by line → Select a line → Enter variables → Auto calculation<br/>
                <strong style={{ color: "#e86a6a" }}>Caution:</strong> According to programming rules, <code style={{background:"rgba(200,50,50,0.2)", padding:"2px 4px", borderRadius:4}}>a/b*c</code> is evaluated as <code style={{color:"#ff9999"}}>(a/b)*c</code>. <strong>To group the denominator, you MUST use parentheses like <code style={{background:"rgba(50,200,50,0.2)", color:"#99ff99", padding:"2px 4px", borderRadius:4}}>a/(b*c)</code>!</strong>
              </div>
            </div>
          </div>
        )}

        {/* ══════════════ CONVERT TAB ══════════════ */}
        {tab === "convert" && <UnitConverter />}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
//  UNIT CONVERTER
// ═══════════════════════════════════════════════════════════════
function UnitConverter() {
  const [mode, setMode] = useState("energy");
  const [inputVal, setInputVal] = useState(1);
  const [inputExp, setInputExp] = useState(0);
  const val = inputVal * Math.pow(10, inputExp);
  const conversions = useMemo(() => {
    switch (mode) {
      case "energy": { const J=val*eVtoJ; return [
        { label:"eV",val },{ label:"meV",value:val*1e3 },{ label:"keV",value:val*1e-3 },
        { label:"MeV",value:val*1e-6 },{ label:"GeV",value:val*1e-9 },{ label:"J",value:J },
        { label:"kJ/mol",value:J*6.0221413e23/1000 },{ label:"cm⁻¹",value:val/(1239.8419e-7) },
        { label:"K",value:val/8.617332e-5 },{ label:"Hz",value:val/4.13566752e-15 },
      ]; }
      case "energy_J": { const ev=val/eVtoJ; return [
        { label:"J",value:val },{ label:"eV",value:ev },{ label:"meV",value:ev*1e3 },
        { label:"keV",value:ev*1e-3 },{ label:"MeV",value:ev*1e-6 },{ label:"GeV",value:ev*1e-9 },
        { label:"kJ/mol",value:val*6.0221413e23/1000 },{ label:"cm⁻¹",value:ev/(1239.8419e-7) },
        { label:"K",value:ev/8.617332e-5 },{ label:"Hz",value:ev/4.13566752e-15 },
      ]; }
      case "length": return [
        { label:"m",value:val },{ label:"nm",value:val*1e9 },{ label:"Å",value:val*1e10 },
        { label:"pm",value:val*1e12 },{ label:"fm",value:val*1e15 },{ label:"μm",value:val*1e6 },
        { label:"mm",value:val*1e3 },{ label:"cm",value:val*1e2 },{ label:"a₀",value:val/5.291772109e-11 },
      ];
      case "mass": return [
        { label:"kg",value:val },{ label:"g",value:val*1e3 },{ label:"u",value:val/1.66053892e-27 },
        { label:"MeV/c²",value:(val/1.66053892e-27)*931.49406 },{ label:"mₑ",value:val/9.1093829e-31 },
      ];
      case "temperature": return [
        { label:"K",value:val },{ label:"°C",value:val-273.15 },{ label:"°F",value:(val-273.15)*9/5+32 },
        { label:"kT (eV)",value:8.617332e-5*val },{ label:"kT (J)",value:1.380649e-23*val },
      ];
      default: return [];
    }
  }, [mode, val]);

  const tSt = (a) => ({ background:mode===a?"rgba(40,80,140,0.5)":"transparent", border:mode===a?"1px solid rgba(100,160,255,0.4)":"1px solid rgba(60,80,120,0.15)", borderRadius:6, padding:"6px 12px", cursor:"pointer", color:mode===a?"#a0ccff":"#5577aa", fontSize:12, fontWeight:600 });
  return (
    <div>
      <div style={{ display:"flex", gap:6, marginBottom:12, flexWrap:"wrap" }}>
        {[["energy","Energy (eV)"],["energy_J","Energy (J)"],["length","Length (m)"],["mass","Mass (kg)"],["temperature","Temp (K)"]].map(([m,l]) =>
          <button key={m} onClick={() => setMode(m)} style={tSt(m)}>{l}</button>
        )}
      </div>
      <div style={{ background:cardBg, borderRadius:8, border:cardBorder, padding:14, marginBottom:12 }}>
        <div style={{ display:"flex", alignItems:"center", gap:6 }}>
          <label style={{ color:"#8899bb", fontSize:12 }}>Value:</label>
          <input type="number" step="any" value={inputVal} onChange={(e) => setInputVal(parseFloat(e.target.value)||0)} style={{width:120,...inputStyle,fontSize:14}} />
          <span style={{ color:"#5577aa", fontSize:13 }}>×10^</span>
          <input type="number" value={inputExp} onChange={(e) => setInputExp(parseInt(e.target.value)||0)} style={{width:60,...inputStyle,fontSize:14}} />
        </div>
        <div style={{ color:"#4a6a90", fontSize:11, marginTop:6, fontFamily:monoFont }}>= {fmt(val)}</div>
      </div>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(200px, 1fr))", gap:6 }}>
        {conversions.map(c => (
          <div key={c.label} style={{ background:cardBg, borderRadius:6, border:"1px solid rgba(60,90,140,0.15)", padding:"8px 10px" }}>
            <div style={{ color:"#5a8abb", fontSize:11, marginBottom:2 }}>{c.label}</div>
            <div style={{ color:"#c8daf0", fontSize:13, fontFamily:monoFont, fontWeight:500 }}>{fmt(c.value ?? c.val)}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
